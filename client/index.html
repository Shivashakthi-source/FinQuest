<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinQuest - AI Gamified Expense Manager</title>
    <script>
      (function () {
        try {
          const theme = localStorage.getItem("theme");
          // Default to dark-first UI if no preference is saved.
          if (theme === "dark" || !theme) document.documentElement.classList.add("dark");
        } catch (e) {
          // Ignore storage errors; dark mode default.
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
